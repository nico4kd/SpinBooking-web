schema: spec-driven

context: |
  Tech stack: Next.js 16, React 19, TypeScript 5 (strict), Tailwind CSS 3, pnpm monorepo
  Architecture: Next.js App Router, feature-based pages under src/app/, shared packages (@spinbooking/types, @spinbooking/utils, @spinbooking/validation)
  State management: TanStack Query v5 for server state, React Context for auth
  Forms: react-hook-form + zod v4 validation via @spinbooking/validation schemas
  Testing: Playwright e2e only (no unit test framework detected)
  Style: ESLint (eslint-config-next), Tailwind with class-variance-authority and tailwind-merge
  UI components: Radix UI primitives, Lucide icons, Sonner toasts, shadcn-style components in src/components/ui/

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages (app routes, shared packages, or both)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider impact on shared packages (@spinbooking/*) when relevant
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Use @/ path alias for src imports
    - Reuse existing UI components from src/components/ui/
    - Prefer TanStack Query mutations/queries for API calls via src/lib/api-client.ts
  verify:
    - Run Playwright e2e tests if applicable (pnpm test:e2e)
    - Compare implementation against every spec scenario
    - Verify TypeScript strict-mode compliance
  archive:
    - Warn before merging destructive deltas (large removals)
